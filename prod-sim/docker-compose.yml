version: "3.7"

services:  
  valAlice:
    command: start --api.enable --api.swagger --home /root/.layer/valAlice
    container_name: valAlice
    image: layerd_i
    environment:
      - LAYERD_NODE_HOME=/root/.layer/valAlice
    networks:
      - net-alice
      - net-public
    volumes:
      - ./valAlice:/root/.layer

  sentryAlice:
    command: start --api.enable --api.swagger --home /root/.layer/sentryAlice --price-daemon-enabled=false
    container_name: sentryAlice
    image: layerd_i
    environment:
      - LAYERD_NODE_HOME=/root/.layer/sentryAlice
    networks:
      - net-alice
      - net-public
    volumes:
      - ./sentryAlice:/root/.layer

  valBob:
    command: start --api.enable --api.swagger --home /root/.layer/valBob
    container_name: valBob
    image: layerd_i
    environment:
      - LAYERD_NODE_HOME=/root/.layer/valBob
    networks:
      - net-bob
      - net-public
    volumes:
      - ./valBob:/root/.layer

  sentryBob:
    command: start --api.enable --api.swagger --home /root/.layer/sentryBob --price-daemon-enabled=false
    container_name: sentryBob
    image: layerd_i
    environment:
      - LAYERD_NODE_HOME=/root/.layer/sentryBob
    networks:
      - net-bob
      - net-public
    volumes:
      - ./sentryBob:/root/.layer

  nodeCarol:
    command: start --api.enable --api.swagger --home /root/.layer/nodeCarol --panic-on-daemon-failure-enabled=false
    container_name: nodeCarol
    image: layerd_i
    environment:
      - LAYERD_NODE_HOME=/root/.layer/nodeCarol
    networks:
      - net-public
    ports:
      - 127.0.0.1:26657:26657
      - 127.0.0.1:1317:1317
    volumes:
      - ./nodeCarol:/root/.layer

  sentryDan:
    command: start --api.enable --api.swagger --home /root/.layer/sentryDan --price-daemon-enabled=false
    container_name: sentryDan
    image: layerd_i
    environment:
      - LAYERD_NODE_HOME=/root/.layer/sentryDan
    networks:
      - net-dan
      - net-public
    volumes:
      - ./sentryDan:/root/.layer

  valDan:
    command: start --api.enable --api.swagger --home /root/.layer/valDan
    container_name: valDan
    image: layerd_i
    environment:
      - LAYERD_NODE_HOME=/root/.layer/valDan
    networks:
      - net-dan
      - net-public
    volumes:
      - ./valDan:/root/.layer

networks:
  net-alice:
  net-bob:
  net-public:
  net-dan:
