version: "2"
run:
  build-tags:
    - e2e
    - ledger
    - test_ledger_mock
  tests: true
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - dogsled
    - errcheck
    - errorlint
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - nolintlint
    - revive
    - staticcheck
    - thelper
    - unconvert
    - unused
  settings:
    dogsled:
      max-blank-identifiers: 8
    gocritic:
      disabled-checks:
        - regexpMust
        - appendAssign
        - ifElseChain
    gosec:
      includes:
        - G102
        - G103
        - G104
        - G106
        - G107
        - G108
        - G109
        - G110
        - G111
        - G112
        - G113
        - G114
        - G201
        - G202
        - G203
        - G204
        - G301
        - G302
        - G303
        - G304
        - G305
        - G306
        - G307
        - G401
        - G402
        - G403
        - G404
        - G501
        - G502
        - G503
        - G504
        - G505
        - G601
    misspell:
      locale: US
    nolintlint:
      require-explanation: true
      require-specific: false
      allow-unused: false
    revive:
      rules:
        - name: redefines-builtin-id
          disabled: true
    staticcheck:
      checks:
        - all
        - -QF1001
        - -QF1002
        - -QF1003
        - -QF1004
        - -QF1005
        - -QF1006
        - -QF1007
        - -QF1008
        - -QF1009
        - -QF1010
        - -QF1011
        - -QF1012
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        text: Use of weak random number generator
      - linters:
          - staticcheck
        text: 'ST1003:'
      - linters:
          - staticcheck
        text: 'ST1016:'
      - linters:
          - staticcheck
        path: migrations
        text: 'SA1019:'
      - linters:
          - staticcheck
        text: 'SA1019: codec.NewAminoCodec is deprecated'
      - linters:
          - staticcheck
        text: 'SA1019: legacybech32.MustMarshalPubKey'
      - linters:
          - staticcheck
        text: 'SA1019: legacybech32.MarshalPubKey'
      - linters:
          - staticcheck
        text: 'SA1019: legacybech32.UnmarshalPubKey'
      - linters:
          - staticcheck
        text: 'SA1019: params.SendEnabled is deprecated'
      - linters:
          - nolintlint
        text: leading space
    paths:
      - server/grpc/gogoreflection/fix_registration.go
      - fix_registration.go
      - .*\.pb\.go$
      - .*\.pb\.gw\.go$
      - .*\.pulsar\.go$
      - crypto/keys/secp256k1/internal/*
      - testutil/testdata
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 10000
  max-same-issues: 10000
formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(cosmossdk.io)
        - prefix(github.com/cosmos/cosmos-sdk)
      custom-order: true
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - server/grpc/gogoreflection/fix_registration.go
      - fix_registration.go
      - .*\.pb\.go$
      - .*\.pb\.gw\.go$
      - .*\.pulsar\.go$
      - crypto/keys/secp256k1/internal/*
      - testutil/testdata
      - third_party$
      - builtin$
      - examples$
